<!--
  ============================================================
  DINAMIS — versi 3
  ============================================================
  ============================================================
  MENGGANTI SUARA AI DENGAN REKAMAN "THERAPIST" SUNGGUHAN:
  ============================================================
  Aplikasi ini otomatis mencari file rekaman lebih dulu; kalau
  tidak ada, ia memakai text-to-speech browser. Cara mengisi:

  1. Buat rekaman suara (pilih salah satu):
     - Rekam sendiri dengan voice memo (bicara pelan & hangat), atau
     - Pakai AI voice yang sangat natural, mis. elevenlabs.io
       (gratis terbatas; pilih suara Indonesia, mode calm/slow)
  2. Simpan sebagai .mp3 dengan nama PERSIS seperti daftar ini:
     napas-tarik.mp3    : "Tarik napas..."
     napas-tahan.mp3    : "Tahan..."
     napas-hembus.mp3   : "Hembuskan..."
     napas-jeda.mp3     : "Siklus selesai... santai dulu sebentar, ya."
     scan-pembuka.mp3   : (naskah NARASI_PEMBUKA di bawah)
     scan-1.mp3 s/d scan-8.mp3 : (naskah tiap langkah LANGKAH_SCAN)
     scan-penutup.mp3   : (naskah NARASI_PENUTUP)
     ground-5.mp3, ground-4.mp3, ground-2.mp3, ground-1.mp3
                        : (naskah "suara" tiap langkah grounding)
     ground-selesai.mp3 : "You're back... perhatianmu sudah kembali..."
  3. Di repositori GitHub, buat folder bernama: audio
     (sejajar dengan index.html), unggah semua mp3 ke sana.
  4. Selesai — tanpa mengubah kode, suara panduan otomatis
     memakai rekamanmu.

  ============================================================
  MEMASANG MUSIK LATAR SUNGGUHAN (SANGAT DISARANKAN):
  ============================================================
  1. Unduh musik piano/ambient BEBAS ROYALTI, mis. dari
     pixabay.com/music (cari: "calm piano meditation").
  2. Ubah nama filenya menjadi PERSIS: musik.mp3
  3. Taruh di folder "audio" di repositori (audio/musik.mp3,
     folder yang sama dengan file narasi suara).
  4. Selesai — aplikasi otomatis memutar file itu berulang
     sebagai musik latar. Selama file belum ada, aplikasi
     tidak bermusik (hening).

  PERBAIKAN DI VERSI INI:
  - Musik latar HANYA dari file sungguhan (audio/musik.mp3);
    musik sintetis buatan kode dihapus total
  - Musik latar dirombak: akord mayor hangat + arpeggio teratur
    mengikuti akord (tidak acak lagi) = nuansa kotak musik/nina
    bobo, bukan horor
  - Suara AI dinormalkan nadanya (pitch rendah ternyata seram)
  - Semua suara dialirkan lewat jalur media player, sehingga
    TETAP BERBUNYI di iPhone meski tombol silent menyala
  - Sistem narasi hibrida: file rekaman (jika ada) > TTS
  - Musik latar kini berupa lagu ambient generatif lembut,
    menyala OTOMATIS pada sentuhan pertama & mengalun di
    seluruh aplikasi (hening hanya di grounding langkah 3)
  - Suara panduan lebih santai & menenangkan: lebih pelan,
    nada lebih rendah, kalimat tidak formal
  - Mesin latihan napas ditulis ulang: jeda otomatis yang
    andal setelah SETIAP siklus + hitungan suara yang tidak
    saling memotong
  - Suara AI lebih calming: lebih pelan, nada lebih rendah,
    memilih suara Indonesia terbaik yang tersedia di perangkat
  - Navigasi bawah diganti: Beranda · Rekap · Tentang
    (Jurnal & fitur lain cukup dari kartu beranda, tidak dobel)
  - Grounding: musik latar ambient otomatis menyala, dan
    SENGAJA HENING di langkah no. 3 (mendengar)
  - Ruang komunitas DIGANTI menjadi Ruang Syukur:
    toples syukur + afirmasi harian, sepenuhnya offline,
    tidak butuh database apa pun

  ============================================================
-->

  @keyframes ripple {
    0% { transform: scale(0.85); opacity: 0.45; }
    100% { transform: scale(1.55); opacity: 0; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: none; }

  .fade { animation: fadeUp 0.55s ease both; }
  input, textarea {
    font-family: 'Nunito', sans-serif;
    font-size: 14.5px; color: var(--text);
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: 16px; padding: 12px 15px; width: 100%;
    outline: none; transition: border-color .3s, box-shadow .3s;
  }
  input:focus, textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 5px rgba(141, 155, 211, 0.15);
  }
  input[type="range"] { padding: 0; border: none; box-shadow: none; accent-color: var(--primary-deep); }
  button { font-family: 'Nunito', sans-serif; }
  button:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 3px solid rgba(94, 107, 168, 0.4); outline-offset: 2px;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>

  catch { return []; }
}
function saveList(key, list) {
  try { localStorage.setItem(key, JSON.stringify(list)); return true; }
  catch { return false; }
}
const fmtTanggal = (iso) => {

    return new Date(iso).toLocaleString("id-ID", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
  } catch { return ""; }

/* ============================================================
   SUARA
   ============================================================ */
let SUARA_ON = true;
let audioCtx = null;
let keluar = null;    // simpul keluaran bersama untuk semua suara
let mediaEl = null;   // elemen <audio> perantara
function ctx() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) {
      audioCtx = new AC();
      keluar = audioCtx.createGain();
      keluar.gain.value = 1;
      // Salurkan semua suara lewat elemen media, supaya iPhone
      // memperlakukannya seperti memutar lagu: TETAP BERBUNYI
      // meskipun tombol silent/senyap di samping HP menyala.
      // Jalur "tembus mode senyap" HANYA untuk iPhone/iPad; di
      // perangkat lain pakai jalur normal. Kalau jalur khusus itu
      // gagal, otomatis kembali ke jalur normal — suara tidak
      // pernah mati total.
      const adaIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      if (adaIOS) {
        try {
          const dest = audioCtx.createMediaStreamDestination();
          keluar.connect(dest);
          mediaEl = document.createElement("audio");
          mediaEl.srcObject = dest.stream;
          mediaEl.setAttribute("playsinline", "");
          const j = mediaEl.play();
          if (j && j.catch) j.catch(() => {
            try { keluar.disconnect(); } catch (e2) {}
            keluar.connect(audioCtx.destination);
            mediaEl = null;
          });
        } catch (e) {
          keluar.connect(audioCtx.destination);
        }
      } else {
        keluar.connect(audioCtx.destination);
      }
    }
  }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  if (mediaEl && mediaEl.paused) mediaEl.play().catch(() => {});
  return audioCtx;
}
function dentang(freq = 528, durasi = 0.9, volume = 0.1) {
  if (!SUARA_ON) return;
  const c = ctx(); if (!c) return;
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.type = "sine"; osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.0001, c.currentTime);
  gain.gain.exponentialRampToValueAtTime(volume, c.currentTime + 0.05);
  gain.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + durasi);
  osc.connect(gain); gain.connect(keluar);
  osc.start(); osc.stop(c.currentTime + durasi + 0.05);
}
function dentangSelesai() { dentang(523, 1.1); setTimeout(() => dentang(659, 1.5), 280); }
function suaraNapas(masuk = true, durasi = 3.5) {
  if (!SUARA_ON) return;
  const c = ctx(); if (!c) return;
  const len = Math.floor(c.sampleRate * durasi);
  const buf = c.createBuffer(1, len, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = c.createBufferSource(); src.buffer = buf;
  const f = c.createBiquadFilter(); f.type = "bandpass"; f.frequency.value = masuk ? 650 : 420; f.Q.value = 0.6;
  const g = c.createGain();
  const puncak = 0.03;
  g.gain.setValueAtTime(0.0001, c.currentTime);
  if (masuk) {
    g.gain.exponentialRampToValueAtTime(puncak, c.currentTime + durasi * 0.7);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + durasi);
  } else {
    g.gain.exponentialRampToValueAtTime(puncak, c.currentTime + durasi * 0.2);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + durasi);
  }
  src.connect(f); f.connect(g); g.connect(keluar);
  src.start(); src.stop(c.currentTime + durasi);
}

/* --- suara panduan yang calming --- */
function pilihSuaraId() {
  if (!window.speechSynthesis) return null;
  const voices = window.speechSynthesis.getVoices();
  // prioritas: suara perempuan Indonesia (umumnya terdengar paling
  // menenangkan), lalu suara Google Indonesia, lalu suara id apa pun
  return voices.find((v) => v.lang && v.lang.startsWith("id") && /female|wanita|perempuan/i.test(v.name))
      || voices.find((v) => v.lang && v.lang.startsWith("id") && /google/i.test(v.name))
      || voices.find((v) => v.lang && v.lang.startsWith("id"))
      || null;
}
let uTerakhir = null; // simpan rujukan: iOS bisa memutus suara yang "dibuang"
function ucap(teks, opsi) {
  if (!SUARA_ON || !window.speechSynthesis) return;
  const o = opsi || {};
  const s = window.speechSynthesis;
  if (!o.antri) s.cancel(); // antri=true: tidak memotong ucapan sebelumnya
  // BUG iOS yang terkenal: setelah cancel(), mesin suara bisa "macet
  // diam" dalam keadaan paused — harus dibangunkan dengan resume()
  try { if (s.paused) s.resume(); } catch (e) {}
  const u = new SpeechSynthesisUtterance(teks);
  u.lang = "id-ID";
  u.rate = o.rate || 0.86;   // pelan tapi tidak "merayap"
  u.pitch = o.pitch || 1.0;  // nada normal — pitch rendah justru terdengar seram
  if (o.onstart) u.onstart = o.onstart; // kabari saat suara BENAR-BENAR mulai
  const v = pilihSuaraId();
  if (v) u.voice = v;
  uTerakhir = u;
  s.speak(u);
  // jaga-jaga iOS: kalau sedetik kemudian mesin masih "paused", bangunkan
  setTimeout(() => { try { if (s.paused) s.resume(); } catch (e) {} }, 250);
}
let narasiEl = null; // pemutar file narasi yang sedang berjalan
function heningkan() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (narasiEl) { try { narasiEl.pause(); } catch (e) {} narasiEl = null; }
}

/* Putar file rekaman suara jika tersedia; kalau tidak ada,
   otomatis jatuh ke text-to-speech. Dengan ini, suara panduan
   bisa diganti rekaman manusia/AI premium TANPA mengubah kode:
   cukup buat folder bernama "audio" di repositori GitHub
   (sejajar dengan index.html) lalu unggah file .mp3 dengan
   nama yang sesuai. Daftar lengkap nama file + naskahnya ada
   di komentar paling atas file ini. */
/* Seperti putarAtauUcap, tapi memanggil onMulai TEPAT saat suara
   mulai terdengar (baik dari file maupun TTS) — dipakai mesin napas
   untuk menyinkronkan hitungan dengan suara. */
function narasikan(namaFile, teks, rate, onMulai) {
  if (!SUARA_ON) { if (onMulai) onMulai(); return; }
  heningkan();
  let jatuh = false, mulaiOk = false;
  let a = null;
  const keTTS = () => {
    if (jatuh || mulaiOk) return;
    jatuh = true;
    if (a) { try { a.pause(); } catch (e) {} }
    ucap(teks, { rate: rate || 0.86, onstart: onMulai });
  };
  try {
    a = new Audio("audio/" + namaFile);
    a.onerror = keTTS;
    a.onplaying = () => { mulaiOk = true; if (onMulai) onMulai(); };
    const janji = a.play();
    if (janji && janji.catch) janji.catch(keTTS);
    setTimeout(keTTS, 1200);
    narasiEl = a;
  } catch (e) { keTTS(); }
}

function putarAtauUcap(namaFile, teks, rate) {
  if (!SUARA_ON) return;
  heningkan();
  let sudahJatuh = false, sudahMulai = false;
  let a = null;
  const keTTS = () => {
    if (sudahJatuh || sudahMulai) return;
    sudahJatuh = true;
    if (a) { try { a.pause(); } catch (e) {} }
    ucap(teks, { rate: rate || 0.86 });
  };
  try {
    a = new Audio("audio/" + namaFile);
    a.onerror = keTTS;
    a.onplaying = () => { sudahMulai = true; };
    const janji = a.play();
    if (janji && janji.catch) janji.catch(keTTS);
    // JARING PENGAMAN: kalau dalam 1,2 detik file belum berbunyi
    // (apa pun penyebabnya), suara TTS langsung mengambil alih.
    setTimeout(keTTS, 1200);
    narasiEl = a;
  } catch (e) {
    keTTS();
  }
}
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

/* --- musik latar: lagu ambient generatif yang lembut ---
   Akord pad yang berganti perlahan + petikan nada pentatonik
   acak, seperti kotak musik yang bermain sangat pelan.
   Otomatis mulai pada sentuhan pertama pengguna (kebijakan
   autoplay browser tidak mengizinkan sebelum ada interaksi). */
let musik = null;

let musikFileEl = null; // pemutar file musik sungguhan (audio/musik.mp3)
function nyalakanLatar() {
  if (!SUARA_ON || musik) return;
  // Musik latar HANYA dari file sungguhan: audio/musik.mp3 di
  // repositori. Kalau file belum diunggah, aplikasi hening saja.
  if (musikFileEl) {
    // lanjutkan dari posisi terakhir (mis. setelah hening di grounding no. 3)
    musikFileEl.play().catch(() => {});
    musik = { jenis: "file", el: musikFileEl };
    return;
  }
  try {
    const el = new Audio("audio/musik.mp3");
    el.loop = true;
    el.volume = 0.45;
    el.setAttribute("playsinline", "");
    // kalau file belum diunggah, biarkan hening (tanpa musik sintetis)
    const diamSaja = () => {
      if (musik && musik.jenis === "file") { musik = null; }
      musikFileEl = null;
    };
    el.onerror = diamSaja;
    const janji = el.play();
    if (janji && janji.catch) janji.catch(diamSaja);
    musikFileEl = el;
    musik = { jenis: "file", el };
    return;
  } catch (e) { /* hening */ }
}

function matikanLatar() {
  if (!musik) return;
  if (musik.jenis === "file") {
    try { musik.el.pause(); } catch (e) {}
    musik = null;
    return;
  }
  clearInterval(musik.gantiAkord); clearInterval(musik.petik);
  try { musik.oscs.forEach((x) => x.o.stop()); } catch (e) {}
  try { musik.master.disconnect(); } catch (e) {}
  musik = null;
}

function LayarNapas() {
  const [tahap, setTahap] = useState("pilih"); // pilih → pra → jalan → pasca → hasil
  const [pola, setPola] = useState(POLA_NAPAS[0]);
  const [tenangAwal, setTenangAwal] = useState(5);
  const [tenangAkhir, setTenangAkhir] = useState(5);
  // tampilan sesi (digerakkan oleh mesin di ref agar bebas race condition)
  const [tampil, setTampil] = useState(null); // {mode, label, angka, skala, durasi, siklus}
  const mesin = useRef(null);
  const timer = useRef(null);
  const totalSiklus = useRef(0);

  const hentikanMesin = () => {
    if (timer.current) { clearTimeout(timer.current); timer.current = null; }
    mesin.current = null;
    heningkan();
  };

  const jadwal = (fn, ms) => {
    if (timer.current) clearTimeout(timer.current);
    timer.current = setTimeout(fn, ms);
  };

  const render = () => {
    const m = mesin.current;
    if (!m) return;
    if (m.mode === "jeda") {
      setTampil({ mode: "jeda", label: "Jeda…", angka: m.sisa, skala: 0.72, durasi: 1.2, siklus: m.siklus });
    } else {
      const f = pola.fase[m.idx];
      // tikKe 0 = masih menunggu suara mulai → angka belum ditampilkan
      setTampil({ mode: "fase", label: f.label, angka: m.tikKe > 0 ? m.tikKe : null, skala: f.skala, durasi: f.detik, siklus: m.siklus });
    }
  };

  const tikFase = () => {
    const m = mesin.current; if (!m || m.mode !== "fase") return;
    const f = pola.fase[m.idx];
    if (m.tikKe < f.detik) {
      m.tikKe += 1;
      dentang(440 + m.tikKe * 50, 0.22, 0.04);
      render();
      jadwal(tikFase, 1000);
    } else if (m.idx < pola.fase.length - 1) {
      mulaiFase(m.idx + 1);
    } else {
      // satu siklus penuh selesai → jeda
      m.siklus += 1; totalSiklus.current = m.siklus;
      m.mode = "jeda"; m.sisa = JEDA_SIKLUS;
      dentang(392, 1.0);
      putarAtauUcap("napas-jeda.mp3", "Siklus " + m.siklus + " selesai... santai dulu sebentar, ya.", 0.86);
      render();
      jadwal(tikJeda, 1000);
    }
  };

  const tikJeda = () => {
    const m = mesin.current; if (!m || m.mode !== "jeda") return;
    if (m.sisa > 1) {
      m.sisa -= 1;
      render();
      jadwal(tikJeda, 1000);
    } else {
      mulaiFase(0);
    }
  };

  const mulaiFase = (idx) => {
    const m = mesin.current; if (!m) return;
    m.mode = "fase"; m.idx = idx; m.tikKe = 0; // 0 = menunggu suara
    const f = pola.fase[idx];
    // efek napas & bel menyala bersamaan dengan suara
    if (f.label === "Tarik napas") { suaraNapas(true, f.detik); dentang(440, 0.6); }
    else if (f.label === "Hembuskan") { suaraNapas(false, f.detik); dentang(392, 0.6); }
    else dentang(523, 0.5);
    render(); // label tampil dulu, angka menunggu

    // === INTI SINKRONISASI ===
    // Hitungan detik BARU berjalan tepat saat suara mulai terdengar,
    // jadi suara dan angka selalu berangkat bersama.
    let sudah = false;
    const mulaiHitung = () => {
      if (sudah) return; sudah = true;
      const mk = mesin.current;
      if (!mk || mk.mode !== "fase" || mk.idx !== idx) return;
      mk.tikKe = 1;
      render();
      jadwal(tikFase, 1000);
    };
    const fileLabel = { "Tarik napas": "napas-tarik.mp3", "Tahan": "napas-tahan.mp3", "Hembuskan": "napas-hembus.mp3" }[f.label];
    narasikan(fileLabel, f.label, 0.9, mulaiHitung);
    setTimeout(mulaiHitung, 800); // jaring pengaman kalau suara telat/mati
  };

  const mulaiSesi = () => {
    hentikanMesin();
    totalSiklus.current = 0;
    mesin.current = { mode: "fase", idx: 0, tikKe: 0, sisa: 0, siklus: 0 };
    setTahap("jalan");
    mulaiFase(0);
  };

  useEffect(() => () => hentikanMesin(), []); // bersihkan saat keluar layar

  const akhiriSesi = () => {
    hentikanMesin();
    setTenangAkhir(tenangAwal);
    setTahap("pasca");
    dentangSelesai();
  };

  const delta = tenangAkhir - tenangAwal;

  return (
    <div className="fade">
      <JudulLayar
        eyebrow="Pernapasan"
        title="Latihan pernapasan terpandu"
        sub="Ikuti irama lingkaran dan suara panduan — kamu bahkan bisa memejamkan mata. Setiap siklus diakhiri jeda sebelum lanjut."
      />

      {tahap === "pilih" && (
        <React.Fragment>
          <KartuUrgensi />
          <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 18 }}>
            {POLA_NAPAS.map((p) => (
              <Kartu key={p.id} onClick={() => setPola(p)} style={{
                padding: 16,
                borderColor: pola.id === p.id ? "var(--primary)" : "var(--line)",
                background: pola.id === p.id ? "var(--primary-soft)" : "var(--surface)",
              }}>
                <div className="display" style={{ fontSize: 15 }}>{p.nama}</div>
                <div style={{ color: "var(--muted)", fontSize: 13, marginTop: 2 }}>{p.deskripsi}</div>
              </Kartu>
            ))}
          </div>
          <div style={{ textAlign: "center" }}>
            <Tombol onClick={() => setTahap("pra")}>Lanjut</Tombol>
          </div>
        </React.Fragment>
      )}

      {tahap === "pra" && (
        <React.Fragment>
          <SkalaTenang label="Sebelum mulai: seberapa tenang kamu sekarang?" nilai={tenangAwal} ubah={setTenangAwal} />
          <p style={{ color: "var(--muted)", fontSize: 13, lineHeight: 1.75 }}>
            Angka ini akan dibandingkan setelah latihan, supaya kamu bisa melihat sendiri
            perubahan di tubuhmu.
          </p>
          <div style={{ textAlign: "center", marginTop: 10 }}>
            <Tombol onClick={mulaiSesi}>Mulai latihan</Tombol>
          </div>
        </React.Fragment>
      )}

      {tahap === "jalan" && tampil && (
        <React.Fragment>
          {tampil.mode === "jeda" ? (
            <Orb
              skala={0.72} durasi={1.2} label="Jeda…" angka={tampil.angka} ripple={false}
              warna="radial-gradient(circle at 35% 30%, #D8EAE0, var(--mint) 55%, #6FA189)"
            />
          ) : (
            <Orb skala={tampil.skala} durasi={tampil.durasi} label={tampil.label} angka={tampil.angka} ripple />
          )}
          <div style={{ textAlign: "center" }}>
            <div style={{ color: "var(--muted)", fontSize: 13, marginBottom: 12 }}>
              Siklus selesai: {tampil.siklus} · disarankan minimal 5 siklus
            </div>
            <Tombol variant="ghost" onClick={akhiriSesi}>Selesai</Tombol>
          </div>
        </React.Fragment>
      )}

      {tahap === "pasca" && (
        <React.Fragment>
          <SkalaTenang label="Sekarang: seberapa tenang kamu setelah latihan?" nilai={tenangAkhir} ubah={setTenangAkhir} />
          <div style={{ textAlign: "center" }}>
            <Tombol onClick={() => { setTahap("hasil"); dentang(659, 1.2); }}>Lihat hasilku</Tombol>
          </div>
        </React.Fragment>
      )}

      {tahap === "hasil" && (
        <Kartu style={{ textAlign: "center", padding: 32 }}>
          <div className="tulis" style={{ color: "var(--primary-deep)", fontSize: 34 }}>Sesi selesai 🌿</div>
          <div style={{ margin: "16px 0", display: "flex", justifyContent: "center", alignItems: "center", gap: 18 }}>
            <div>
              <div style={{ color: "var(--muted)", fontSize: 12 }}>Sebelum</div>
              <div className="display" style={{ fontSize: 34 }}>{tenangAwal}</div>
            </div>
            <div style={{ color: "var(--primary)", fontSize: 26 }}>→</div>
            <div>
              <div style={{ color: "var(--muted)", fontSize: 12 }}>Sesudah</div>
              <div className="display" style={{ fontSize: 34, color: "var(--primary-deep)" }}>{tenangAkhir}</div>
            </div>
          </div>
          <div style={{
            display: "inline-block", background: "var(--primary-soft)", color: "var(--primary-deep)",
            borderRadius: 999, padding: "6px 18px", fontWeight: 800, fontSize: 14, marginBottom: 16,
          }}>
            {delta > 0 ? "Ketenanganmu naik +" + delta + " poin" :
             delta === 0 ? "Ketenanganmu stabil" :
             "Perubahan " + delta + " poin — dan itu tidak apa-apa"}
          </div>
          <p style={{ color: "var(--muted)", fontSize: 13.5, lineHeight: 1.9, textAlign: "left" }}>
            <strong style={{ color: "var(--text)" }}>Apa arti "selesai"?</strong> Kamu menyelesaikan
            {" "}{totalSiklus.current} siklus napas {pola.nama}. Hembusan panjangmu mengaktifkan "rem"
            alami tubuh: detak jantung melambat, otot mengendur, dan otak menerima sinyal bahwa kamu aman.
            {delta > 0 && " Kenaikan angka tadi adalah bukti nyata perubahan itu."}
            {delta === 0 && " Angka yang stabil pun berarti: kamu berhasil menahan gelombang agar tidak naik."}
            {delta < 0 && " Kalau angkanya turun, itu bukan kegagalan — kadang saat melambat, kita baru menyadari perasaan yang tertutup kesibukan."}
          </p>
          <Tombol variant="soft" onClick={() => setTahap("pilih")}>Latihan lagi</Tombol>
        </Kartu>
      )}
    </div>
  );
}

  const [sisa, setSisa] = useState(DETIK_LANGKAH);

  useEffect(() => {
    if (mode === "pembuka") {
      dentang(440, 1.2);
      putarAtauUcap("scan-pembuka.mp3", NARASI_PEMBUKA, 0.85);
      const t = setTimeout(() => { setIdx(0); setSisa(DETIK_LANGKAH); setMode("jalan"); }, DETIK_PEMBUKA * 1000);
      return () => clearTimeout(t);
    }
    if (mode === "selesai") {
      dentangSelesai();
      putarAtauUcap("scan-penutup.mp3", NARASI_PENUTUP, 0.85);
    }
  }, [mode]);

  useEffect(() => {
    if (mode !== "jalan") return;
    dentang(494, 0.7);
    suaraNapas(true, 3.5);
    putarAtauUcap("scan-" + (idx + 1) + ".mp3", LANGKAH_SCAN[idx].panduan, 0.85);
  }, [idx, mode]);

  useEffect(() => {
    if (mode !== "jalan") return;
    const t = setInterval(() => {
      setSisa((s) => {
        if (s > 1) return s - 1;
        setIdx((i) => {
          if (i >= LANGKAH_SCAN.length - 1) { setMode("selesai"); return i; }
          return i + 1;
        });
        return DETIK_LANGKAH;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [mode]);

  const langkah = LANGKAH_SCAN[idx];
  const progres = ((idx + (DETIK_LANGKAH - sisa) / DETIK_LANGKAH) / LANGKAH_SCAN.length) * 100;

  return (
    <div className="fade">
      <JudulLayar
        eyebrow="Body Scan"
        title="Pemindaian tubuh"
        sub="Perjalanan kesadaran dari kepala hingga kaki dengan panduan suara yang lembut — sekitar 4 menit."
      />

      {mode === "siap" && (
        <React.Fragment>
          <Kartu style={{ marginBottom: 16, background: "var(--mint-soft)", borderColor: "#D3E9DD" }}>
            <p style={{ fontSize: 13.5, lineHeight: 1.85, margin: 0 }}>
              Stres sering "bersembunyi" di tubuh — rahang mengeras, bahu terangkat,
              perut menegang — tanpa kita sadari. Body scan melatihmu menemukannya lebih awal.
              Nyalakan suara (🔊) dan gunakan earphone untuk pengalaman terbaik.
            </p>
          </Kartu>
          <div style={{ textAlign: "center", marginTop: 20 }}>
            <Tombol onClick={() => setMode("pembuka")}>Mulai perjalanan</Tombol>
          </div>
        </React.Fragment>
      )}

      {mode === "pembuka" && (
        <Kartu style={{ textAlign: "center", padding: 36 }}>
          <div className="tulis" style={{ color: "var(--primary-deep)", fontSize: 34 }}>Halo, Jiwa Dinamis.</div>
          <p style={{ color: "var(--muted)", fontSize: 14.5, lineHeight: 2 }}>
            Cari posisi yang paling nyaman.<br />
            Saat ini, tidak ada yang perlu kamu lakukan<br />
            selain fokus pada tubuhmu.<br />
            Jika pikiran melantur, tidak apa-apa —<br />
            kembalilah dengan lembut.
          </p>
          <div style={{ color: "var(--primary)", fontSize: 13 }}>Perjalanan dimulai sebentar lagi…</div>
          <div style={{ marginTop: 16 }}>
            <Tombol variant="ghost" onClick={() => { heningkan(); setIdx(0); setSisa(DETIK_LANGKAH); setMode("jalan"); }}>Langsung mulai</Tombol>
          </div>
        </Kartu>
      )}

      {mode === "selesai" && (
        <Kartu style={{ textAlign: "center", padding: 36 }}>
          <div className="tulis" style={{ color: "var(--primary-deep)", fontSize: 36 }}>Terima kasih 🌿</div>
          <p style={{ fontSize: 15, lineHeight: 2 }}>
            Terima kasih sudah meluangkan waktu<br />untuk dirimu sendiri.
          </p>
          <p style={{ color: "var(--muted)", fontSize: 13.5, lineHeight: 1.9, textAlign: "left" }}>
            Kamu telah menyapa 8 area tubuh dengan perhatian penuh. Coba rasakan:
            apakah bahu atau rahangmu terasa berbeda dibanding sebelum mulai?
          </p>
          <Tombol variant="soft" onClick={() => setMode("pembuka")}>Ulangi</Tombol>
        </Kartu>
      )}

      {mode === "jalan" && (
        <React.Fragment>
          <div style={{ height: 6, background: "var(--line)", borderRadius: 999, marginBottom: 24 }}>
            <div style={{ height: 6, width: progres + "%", background: "linear-gradient(90deg, var(--mint), var(--primary))", borderRadius: 999, transition: "width 1s linear" }} />
          </div>
          <Kartu style={{ textAlign: "center", padding: 32 }}>
            <div style={{ color: "var(--muted)", fontSize: 12, letterSpacing: 2, textTransform: "uppercase" }}>
              Langkah {idx + 1} dari {LANGKAH_SCAN.length}
            </div>
            <div className="display" style={{ fontSize: 25, margin: "12px 0" }}>{langkah.area}</div>
            <p style={{ color: "var(--primary-deep)", fontSize: 14.5, lineHeight: 2 }}>{langkah.panduan}</p>
            <div className="display" style={{ color: "var(--primary)", fontSize: 34, marginTop: 6 }}>{sisa}</div>
          </Kartu>
          <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 18 }}>
            <Tombol variant="ghost" onClick={() => { setIdx(Math.max(0, idx - 1)); setSisa(DETIK_LANGKAH); }}>Sebelumnya</Tombol>
            <Tombol variant="ghost" onClick={() => {
              if (idx >= LANGKAH_SCAN.length - 1) setMode("selesai");
              else { setIdx(idx + 1); setSisa(DETIK_LANGKAH); }
            }}>Lewati</Tombol>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

function buatRespons(emosi, intensitas, teks) {
  const dasar = {
    Cemas: "Terima kasih sudah menuliskan kecemasanmu. Cemas boleh hadir — ia tamu, bukan penghuni tetap.",
    Sedih: "Kesedihanmu valid. Kamu tidak perlu buru-buru 'baik-baik saja'.",
    Marah: "Marahmu didengar. Ada kebutuhan atau batas yang sedang minta diperhatikan.",
    Lelah: "Lelahmu nyata dan layak dihargai, bukan disangkal.",
    Bingung: "Tidak apa-apa belum punya jawaban. Kebingungan adalah bagian dari proses menimbang.",
    Tenang: "Senang mendengar kamu tenang. Sadari rasanya, supaya tubuhmu mengingat jalan ke sini.",
    Senang: "Ikut senang! Nikmati sepenuhnya — kebahagiaan juga layak diberi perhatian penuh.",
    Bersyukur: "Indahnya. Syukur yang disadari melipatgandakan hal baik itu sendiri.",
  }[emosi] || "Terima kasih sudah jujur pada dirimu.";

  const t = (" " + teks + " ").toLowerCase();
  const cocok = KONTEKS.find((k) => k.kunci.some((kata) => t.includes(kata)));
  let hasil = dasar;
  if (cocok) hasil += " " + cocok.tanggapan;
  if (intensitas >= 4 && ["Cemas", "Marah", "Sedih", "Lelah"].includes(emosi)) {
    hasil += " Karena rasanya cukup kuat saat ini, coba luangkan 2 menit untuk latihan Napas Tenang atau Grounding di beranda — biarkan tubuhmu ikut menurunkan volumenya.";
  }
  return hasil;
}

function RekapMingguan({ entri }) {
  const rekap = useMemo(() => {
    const batas = Date.now() - 7 * 24 * 60 * 60 * 1000;
    const minggu = entri.filter((e) => new Date(e.waktu).getTime() >= batas);
    const map = {};
    minggu.forEach((e) => {
      if (!map[e.emosi]) map[e.emosi] = { jumlah: 0, totalInt: 0, warna: e.warna };
      map[e.emosi].jumlah += 1;
      map[e.emosi].totalInt += e.intensitas;
    });
    const daftar = Object.entries(map)
      .map(([nama, d]) => ({ nama, ...d, rerata: (d.totalInt / d.jumlah).toFixed(1) }))
      .sort((a, b) => b.jumlah - a.jumlah);
    return { total: minggu.length, daftar };
  }, [entri]);

  if (rekap.total === 0) {
    return (
      <Kartu style={{ marginBottom: 16 }}>
        <div className="display" style={{ fontSize: 15, marginBottom: 6 }}>📊 Rekap 7 hari terakhir</div>
        <p style={{ color: "var(--muted)", fontSize: 13, margin: 0, lineHeight: 1.75 }}>
          Belum ada catatan minggu ini. Setelah kamu menulis beberapa refleksi di Jurnal,
          rekap emosi mingguanmu muncul di sini.
        </p>
      </Kartu>
    );
  }

  const maks = rekap.daftar[0].jumlah;
  const dominan = rekap.daftar[0].nama;

  return (
    <Kartu style={{ marginBottom: 16 }}>
      <div className="display" style={{ fontSize: 15, marginBottom: 2 }}>📊 Rekap 7 hari terakhir</div>
      <div style={{ color: "var(--muted)", fontSize: 13, marginBottom: 14 }}>
        {rekap.total} refleksi · paling sering: <strong style={{ color: "var(--text)" }}>{dominan}</strong>
      </div>
      {rekap.daftar.map((d) => (
        <div key={d.nama} style={{ marginBottom: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 4 }}>
            <span style={{ color: d.warna, fontWeight: 800 }}>{d.nama}</span>
            <span style={{ color: "var(--muted)" }}>{d.jumlah}× · intensitas {d.rerata}/5</span>
          </div>
          <div style={{ height: 10, background: "var(--bg)", borderRadius: 999 }}>
            <div style={{
              height: 10, borderRadius: 999, background: d.warna,
              width: Math.max(8, (d.jumlah / maks) * 100) + "%", transition: "width .6s ease",
            }} />
          </div>
        </div>
      ))}
      <div style={{ marginTop: 14, background: "var(--primary-soft)", borderRadius: 16, padding: "13px 15px", fontSize: 13.5, lineHeight: 1.85 }}>

      </div>
    </Kartu>
  );
}

const AFIRMASI = [
  "Aku boleh melangkah pelan. Yang penting, aku tetap melangkah.",
  "Perasaanku valid, dan aku tidak harus menghadapinya sendirian.",
  "Aku lebih luas dari rasa cemasku.",
  "Hari ini, cukup menjadi diriku sendiri.",
  "Aku sedang bertumbuh, bahkan saat rasanya diam di tempat.",
  "Aku berhak beristirahat tanpa merasa bersalah.",
  "Satu napas dalam satu waktu — itu sudah cukup.",
  "Aku tidak harus sempurna untuk berharga.",
  "Kesalahan adalah bukti aku sedang mencoba.",
  "Aku memilih memperlakukan diriku seperti aku memperlakukan sahabatku.",
  "Badai pikiran akan berlalu. Aku bisa menunggunya dengan tenang.",
  "Aku sudah melewati banyak hari sulit — dan aku masih di sini.",
  "Hal kecil yang kulakukan hari ini tetap berarti.",
  "Aku memberi ruang untuk semua perasaanku, tanpa dikuasainya.",
];
function afirmasiHariIni() {
  const kini = new Date();
  const awalTahun = new Date(kini.getFullYear(), 0, 0);
  const hariKe = Math.floor((kini - awalTahun) / 86400000);
  return AFIRMASI[hariKe % AFIRMASI.length];
}

function LayarSyukur() {
  const [catatan, setCatatan] = useState([]);
  const [teks, setTeks] = useState("");
  const [terambil, setTerambil] = useState(null);
  const [status, setStatus] = useState("");
  const afirmasi = afirmasiHariIni();

  useEffect(() => { setCatatan(loadList("dinamis-syukur")); }, []);

  const simpan = () => {
    if (!teks.trim()) return;
    const baru = { id: Date.now(), teks: teks.trim(), waktu: new Date().toISOString() };
    const daftar = [baru, ...catatan];
    if (saveList("dinamis-syukur", daftar)) {
      setCatatan(daftar); setTeks(""); setTerambil(null);
      setStatus("Tersimpan di toplesmu. 🫙");
      dentang(587, 0.8);
      setTimeout(() => setStatus(""), 3000);
    } else setStatus("Gagal menyimpan. Coba lagi ya.");
  };

  const ambilAcak = () => {
    if (catatan.length === 0) return;
    const acak = catatan[Math.floor(Math.random() * catatan.length)];
    setTerambil(acak);
    dentang(659, 0.9);
  };

  const hapus = (id) => {
    const daftar = catatan.filter((c) => c.id !== id);
    if (saveList("dinamis-syukur", daftar)) {
      setCatatan(daftar);
      if (terambil && terambil.id === id) setTerambil(null);
    }
  };

  return (
    <div className="fade">
      <JudulLayar
        eyebrow="Ruang Syukur"
        title="Toples syukur & afirmasi"
        sub="Simpan hal-hal baik di hari-hari terang, lalu ambil kembali di hari-hari berat."
      />

      <Kartu style={{ marginBottom: 16, background: "linear-gradient(150deg, var(--primary-soft), var(--mint-soft))", border: "none", textAlign: "center", padding: 26 }}>
        <div style={{ color: "var(--primary-deep)", fontSize: 12, letterSpacing: 2, textTransform: "uppercase", fontWeight: 800, marginBottom: 8 }}>
          Afirmasi hari ini
        </div>
        <div className="tulis" style={{ fontSize: 28, lineHeight: 1.35 }}>
          "{afirmasi}"
        </div>
        <button onClick={() => ucap(afirmasi, { rate: 0.8 })} style={{
          marginTop: 12, background: "rgba(255,255,255,0.7)", border: "none", borderRadius: 999,
          color: "var(--primary-deep)", fontWeight: 700, fontSize: 13, padding: "8px 18px", cursor: "pointer",
        }}>
          🔊 Dengarkan
        </button>
      </Kartu>

      <Kartu style={{ marginBottom: 14 }}>
        <div className="display" style={{ fontSize: 15, marginBottom: 8 }}>🫙 Masukkan ke toples</div>
        <textarea rows={2} value={teks} onChange={(e) => setTeks(e.target.value)}
          placeholder="Satu hal kecil yang kamu syukuri hari ini…" style={{ resize: "vertical" }} />
        <div style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <Tombol onClick={simpan} disabled={!teks.trim()}>Simpan</Tombol>
          {status && <span style={{ color: "var(--primary-deep)", fontSize: 13 }}>{status}</span>}
        </div>
      </Kartu>

      <Kartu style={{ marginBottom: 14, textAlign: "center", padding: 26 }}>
        <div style={{ fontSize: 44 }}>🫙</div>
        <div style={{ color: "var(--muted)", fontSize: 13, margin: "6px 0 14px" }}>
          {catatan.length === 0
            ? "Toplesmu masih kosong — isi dengan hal baik pertamamu."
            : "Ada " + catatan.length + " kenangan baik di toplesmu."}
        </div>
        <Tombol variant="soft" onClick={ambilAcak} disabled={catatan.length === 0}>
          ✨ Ambil satu untuk hari ini
        </Tombol>
        {terambil && (
          <div style={{
            marginTop: 16, background: "var(--peach-soft)", borderRadius: 18,
            padding: "16px 18px", textAlign: "left",
          }}>
            <div className="tulis" style={{ fontSize: 24, color: "var(--primary-deep)" }}>Dari kamu, untuk kamu 💌</div>
            <p style={{ fontSize: 14.5, lineHeight: 1.8, margin: "6px 0 4px" }}>"{terambil.teks}"</p>
            <div style={{ color: "var(--muted)", fontSize: 12 }}>Ditulis {fmtTanggal(terambil.waktu)}</div>
          </div>
        )}
      </Kartu>

      <div style={{ color: "var(--muted)", fontSize: 12, letterSpacing: 2, textTransform: "uppercase", margin: "22px 0 10px" }}>
        Isi toples
      </div>
      {catatan.length === 0 && (
        <p style={{ color: "var(--muted)", fontSize: 14 }}>Belum ada catatan syukur.</p>
      )}
      {catatan.map((c) => (
        <Kartu key={c.id} style={{ marginBottom: 10, padding: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
            <p style={{ fontSize: 14, lineHeight: 1.7, margin: 0 }}>{c.teks}</p>
            <button onClick={() => hapus(c.id)}
              style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer", fontSize: 12, flexShrink: 0 }}>
              Hapus
            </button>
          </div>
          <div style={{ color: "var(--muted)", fontSize: 12, marginTop: 6 }}>{fmtTanggal(c.waktu)}</div>
        </Kartu>
      ))}

      <p style={{ color: "var(--muted)", fontSize: 12, lineHeight: 1.85, marginTop: 22 }}>
        Riset psikologi positif menunjukkan kebiasaan mencatat rasa syukur secara
        rutin berkaitan dengan suasana hati yang lebih baik dan ketahanan emosi.
      </p>
    </div>
  );
}

   APP — nav bawah: Beranda · Rekap · Tentang
   (Jurnal & fitur lain diakses dari kartu beranda, tidak dobel)
   ============================================================ */
const TAB = [
  { key: "beranda", label: "Beranda", ikon: "⌂" },
  { key: "rekap", label: "Rekap", ikon: "📊" },
  { key: "tentang", label: "Tentang", ikon: "♡" },
];

function DinamisApp() {
  const [layar, setLayar] = useState("beranda");
  const [suara, setSuara] = useState(true);
  const [gerbang, setGerbang] = useState(true); // layar sambutan

  // fallback: kalau pengguna menyentuh apa pun sebelum menekan tombol
  // masuk, musik tetap menyala (browser melarang audio tanpa interaksi)
  useEffect(() => {
    const mulai = () => {
      nyalakanLatar();
      window.removeEventListener("pointerdown", mulai);
    };
    window.addEventListener("pointerdown", mulai);
    return () => window.removeEventListener("pointerdown", mulai);
  }, []);

  const [hasilTes, setHasilTes] = useState(null);

  const tesSuara = () => {
    const hasil = { bel: "… mencoba", suara: "… mencoba", musik: "… mencoba" };
    setHasilTes({ ...hasil });
    // 1) bel / efek (Web Audio)
    try {
      const c = ctx();
      if (c) {
        dentang(660, 0.6, 0.12);
        hasil.bel = c.state === "running" ? "✓ jalur efek aktif — harusnya terdengar 'ting'" : "✗ audio ditahan browser (state: " + c.state + ")";
      } else hasil.bel = "✗ Web Audio tidak didukung";
    } catch (e) { hasil.bel = "✗ error: " + e.message; }
    setHasilTes({ ...hasil });
    // 2) suara panduan (TTS)
    if (window.speechSynthesis) {
      const s = window.speechSynthesis;
      s.cancel();
      try { if (s.paused) s.resume(); } catch (e) {}
      const u = new SpeechSynthesisUtterance("Halo. Suara panduan aktif.");
      u.lang = "id-ID"; u.rate = 0.95;
      u.onstart = () => { hasil.suara = "✓ suara panduan berbunyi"; setHasilTes({ ...hasil }); };
      u.onerror = () => { hasil.suara = "✗ suara panduan gagal berbunyi"; setHasilTes({ ...hasil }); };
      uTerakhir = u;
      s.speak(u);
      setTimeout(() => {
        if (hasil.suara.indexOf("…") === 0) { hasil.suara = "✗ suara panduan diam (mesin TTS tidak merespons)"; setHasilTes({ ...hasil }); }
        try { if (s.paused) s.resume(); } catch (e) {}
      }, 2500);
    } else hasil.suara = "✗ perangkat tidak mendukung TTS";
    setHasilTes({ ...hasil });
    // 3) file musik
    try {
      const a = new Audio("audio/musik.mp3");
      a.volume = 0.6;
      a.onplaying = () => {
        hasil.musik = "✓ audio/musik.mp3 ditemukan & berbunyi";
        setHasilTes({ ...hasil });
        setTimeout(() => { try { a.pause(); } catch (e) {} }, 5000);
      };
      a.onerror = () => { hasil.musik = "✗ file audio/musik.mp3 TIDAK ADA di repositori"; setHasilTes({ ...hasil }); };
      const p = a.play();
      if (p && p.catch) p.catch(() => {
        if (hasil.musik.indexOf("…") === 0) { hasil.musik = "✗ musik tidak bisa diputar (file tidak ada / diblokir)"; setHasilTes({ ...hasil }); }
      });
    } catch (e) { hasil.musik = "✗ error: " + e.message; setHasilTes({ ...hasil }); }
  };

  const masuk = () => {
    ctx();                // buka izin audio efek/musik dalam ketukan ini
    if (window.speechSynthesis) {
      // buka izin suara panduan di iPhone/iPad (perlu "dipancing"
      // sekali dari dalam sentuhan pengguna)
      const u = new SpeechSynthesisUtterance(" ");
      u.volume = 0;
      window.speechSynthesis.speak(u);
    }
    nyalakanLatar();      // musik mengalun begitu masuk
    dentang(523, 1.0);
    setGerbang(false);
  };

  if (gerbang) {
    return (
      <div style={{
        minHeight: "100vh", display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center", padding: 24, textAlign: "center",
      }}>
        <Logo ukuran={110} />
        <div className="display" style={{ color: "var(--primary-deep)", fontSize: 17, letterSpacing: 8, textTransform: "uppercase", marginTop: 18 }}>
          {APP_NAME}
        </div>
        <div className="tulis" style={{ fontSize: 34, color: "var(--primary-deep)", margin: "14px 0 6px" }}>
          Halo, Jiwa DINAMIS.
        </div>
        <p style={{ color: "var(--muted)", fontSize: 14, lineHeight: 1.85, maxWidth: 300, margin: "0 0 26px" }}>
          Tarik napas sejenak…<br />ruang tenangmu sudah menunggu di dalam.
        </p>
        <Tombol onClick={masuk}>🌿 Masuk ke ruang tenang</Tombol>
        <p style={{ color: "var(--muted)", fontSize: 11.5, marginTop: 14 }}>
          Musik latar akan mengalun begitu kamu masuk 🎵
        </p>
        <button onClick={tesSuara} style={{
          marginTop: 18, background: "none", border: "1.5px solid var(--line)",
          borderRadius: 999, color: "var(--muted)", fontWeight: 700, fontSize: 12,
          padding: "7px 16px", cursor: "pointer",
        }}>🔧 Tes suara</button>
        {hasilTes && (
          <div style={{ marginTop: 12, textAlign: "left", fontSize: 12.5, lineHeight: 1.9, color: "var(--muted)", background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 14, padding: "10px 14px", maxWidth: 320 }}>
            <div>Efek: {hasilTes.bel}</div>
            <div>Panduan: {hasilTes.suara}</div>
            <div>Musik: {hasilTes.musik}</div>
          </div>
        )}
        <p style={{ color: "var(--line)", fontSize: 10, marginTop: 14 }}>v19</p>
      </div>
    );
  }

  const toggleSuara = () => {
    const baru = !suara;
    setSuara(baru);
    SUARA_ON = baru;
    if (!baru) { heningkan(); matikanLatar(); }
    else { dentang(587, 0.5); nyalakanLatar(); }
  };

  const pindah = (l) => { heningkan(); setLayar(l); };

  const konten = {
    beranda: <LayarBeranda pindah={pindah} />,
    napas: <LayarNapas />,
    scan: <LayarBodyScan />,
    jurnal: <LayarJurnal />,
    ground: <LayarGrounding />,
    syukur: <LayarSyukur />,
    rekap: <LayarRekap pindah={pindah} />,
    tentang: <LayarTentang />,
  }[layar];

  const tabAktif = layar === "rekap" ? "rekap" : layar === "tentang" ? "tentang" : "beranda";

  return (
    <div style={{ minHeight: "100vh" }}>
      <button onClick={toggleSuara} title={suara ? "Matikan suara" : "Nyalakan suara"} style={{
        position: "fixed", top: 14, right: 14, zIndex: 20,
        width: 46, height: 46, borderRadius: "50%",
        background: "var(--surface)", border: "1px solid var(--line)",
        boxShadow: "var(--shadow)", cursor: "pointer", fontSize: 18,
      }}>
        {suara ? "🔊" : "🔇"}
      </button>

      <div style={{ maxWidth: 480, margin: "0 auto", padding: "18px 20px 104px" }}>
        {layar !== "beranda" && (
          <button onClick={() => pindah("beranda")} style={{
            background: "none", border: "none", color: "var(--primary-deep)",
            cursor: "pointer", fontSize: 14, fontWeight: 800, padding: "6px 0 16px",
          }}>← Beranda</button>
        )}
        {konten}
      </div>

      <nav style={{
        position: "fixed", bottom: 0, left: 0, right: 0,
        background: "rgba(255,255,255,0.92)", backdropFilter: "blur(14px)",
        borderTop: "1px solid var(--line)",
      }}>
        <div style={{ maxWidth: 480, margin: "0 auto", display: "flex" }}>
          {TAB.map((t) => (
            <button key={t.key} onClick={() => pindah(t.key)} style={{
              flex: 1, background: "none", border: "none", cursor: "pointer",
              padding: "12px 0 16px",
              color: tabAktif === t.key ? "var(--primary-deep)" : "var(--muted)",
              transition: "color .3s",
            }}>
              <div style={{ fontSize: 18 }}>{t.ikon}</div>
              <div style={{ fontSize: 11, fontWeight: 800, marginTop: 2 }}>{t.label}</div>
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<DinamisApp />);
</script>
</body>
</html>
